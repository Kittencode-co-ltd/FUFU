<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="FUFU Pet Care – Premium AI Pet Medical Center. Instant AI-powered diagnosis, treatment plans, and 24/7 vet consultations for your beloved pets." />
  <title>FUFU Pet Care – Premium AI Pet Medical Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Screen Containers -->
  <div id="screen-splash-container"></div>
  <div id="screen-onboarding-container"></div>
  <div id="screen-auth-container"></div>
  <div id="screen-profile-container"></div>
  <div id="screen-plans-container"></div>
  <div id="screen-payment-container"></div>
  <div id="screen-pet-selection-container"></div>
  <div id="screen-scan-container"></div>
  <div id="screen-result-container"></div>
  <div id="screen-pet-detail-container"></div>
  <div id="screen-home-container"></div>
  <div id="screen-health-container"></div>
  <div id="screen-chat-container"></div>
  <div id="screen-owner-container"></div>
  <div id="screen-game-container"></div>
  <div id="screen-help-container"></div>

  <!-- Bottom Nav Container -->
  <div id="bottom-nav-container"></div>

  <!-- Login Modal Container -->
  <div id="login-modal-container"></div>

  <!-- Component Loader -->
  <script>
    const components = [
      { id: 'screen-splash-container', url: 'screens/screen-splash.html' },
      { id: 'screen-onboarding-container', url: 'screens/screen-onboarding.html' },
      { id: 'screen-auth-container', url: 'screens/screen-auth.html' },
      { id: 'screen-profile-container', url: 'screens/screen-profile.html' },
      { id: 'screen-plans-container', url: 'screens/screen-plans.html' },
      { id: 'screen-payment-container', url: 'screens/screen-payment.html' },
      { id: 'screen-pet-selection-container', url: 'screens/screen-pet-selection.html' },
      { id: 'screen-scan-container', url: 'screens/screen-scan.html' },
      { id: 'screen-result-container', url: 'screens/screen-result.html' },
      { id: 'screen-pet-detail-container', url: 'screens/screen-pet-detail.html' },
      { id: 'screen-home-container', url: 'screens/screen-home.html' },
      { id: 'screen-health-container', url: 'screens/screen-health.html' },
      { id: 'screen-chat-container', url: 'screens/screen-chat.html' },
      { id: 'screen-owner-container', url: 'screens/screen-owner.html' },
      { id: 'screen-game-container', url: 'screens/screen-game.html' },
      { id: 'screen-help-container', url: 'screens/screen-help.html' },
      { id: 'bottom-nav-container', url: 'screens/bottom-nav.html' },
      { id: 'login-modal-container', url: 'screens/login-modal.html' }
    ];

    async function loadComponents() {
      const promises = components.map(async (comp) => {
        try {
          const resp = await fetch(comp.url);
          if (resp.ok) {
            const html = await resp.text();
            const container = document.getElementById(comp.id);
            if (container) {
              container.insertAdjacentHTML('beforebegin', html);
              container.remove();
            }
          } else {
            console.error('Failed to load ' + comp.url);
          }
        } catch (e) {
          console.error('Error loading ' + comp.url, e);
        }
      });

      // Wait for all HTML components to be fetched and injected
      await Promise.all(promises);

      // Load main app.js AFTER all HTML components are in the DOM
      const script = document.createElement('script');
      script.src = 'app.js?v=' + new Date().getTime();
      document.body.appendChild(script);
    }

    // Start loading
    loadComponents();
  </script>

</body>

</html>
