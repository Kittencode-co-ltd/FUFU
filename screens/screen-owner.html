<div id="screen-owner" class="screen">
    <div class="screen-inner">
        <div class="owner-hero">
            <label for="owner-photo-input" class="owner-avatar" id="owner-avatar" style="cursor:pointer;">
                <svg class="owner-avatar-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2C8.69 2 6 4.69 6 8a5.98 5.98 0 0 0 1.94 4.38C5.23 13.9 3 16.59 3 20v2h18v-2c0-3.41-2.23-6.1-4.94-7.62A5.98 5.98 0 0 0 18 8c0-3.31-2.69-6-6-6zm0 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8z" />
                </svg>
                <div class="avatar-edit-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="8" width="18" height="12" rx="2" />
                        <circle cx="12" cy="14" r="3" />
                        <path d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2" />
                    </svg>
                </div>
            </label>
            <input type="file" id="owner-photo-input" accept="image/*" style="display:none;"
                onchange="handleOwnerPhotoUpload(event)">
            <div class="owner-name" id="owner-display-name">Pet Owner</div>
            <div class="owner-email" id="owner-display-email">owner@email.com</div>
            <div class="owner-plan-pill" id="owner-plan-pill">Free Plan</div>
        </div>
        <div class="owner-section">
            <div class="owner-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Full Name</div>
                    <div class="owner-row-val" id="owner-row-name">Pet Owner</div>
                </div>
            </div>
            <div class="owner-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Email</div>
                    <div class="owner-row-val" id="owner-row-email">owner@email.com</div>
                </div>
            </div>
            <div class="owner-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Plan</div>
                    <div class="owner-row-val" id="owner-row-plan">Essential (Free)</div>
                </div>
                <button class="owner-upgrade-btn" onclick="goToScreen('screen-plans')">Upgrade</button>
            </div>
            <div class="owner-row" onclick="goToScreen('screen-home')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">My Pets</div>
                    <div class="owner-row-val" id="owner-row-pets">1 pet registered</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="width:16px;height:16px;opacity:.35">
                    <path d="M9 18l6-6-6-6" />
                </svg>
            </div>
            <div class="owner-row" onclick="editProfile()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Edit Profile</div>
                    <div class="owner-row-val">Update name & email</div>
                </div>
            </div>
            <div class="owner-row" onclick="changePassword()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Change Password</div>
                    <div class="owner-row-val">Secure your account</div>
                </div>
            </div>
            <div class="owner-row" onclick="goToScreen('screen-help')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="owner-row-icon">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                <div class="owner-row-info">
                    <div class="owner-row-label">Help Center</div>
                    <div class="owner-row-val">Support & Policies</div>
                </div>
            </div>
        </div>
        <button class="btn-secondary owner-logout-btn" onclick="doLogout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon"
                style="stroke:var(--slate)">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Sign Out
        </button>
    </div>
</div>
