<div id="screen-pet-selection" class="screen">
    <div class="screen-inner" style="display:flex; flex-direction:column; height:100%;">

        <!-- ── Header ── -->
        <div class="screen-header">
            <button class="icon-btn" onclick="goToScreen('screen-home')" style="margin-left:-8px; margin-bottom:12px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    style="width:24px;height:24px;">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="header-chip">AI Diagnosis</div>
            <h1 class="screen-title">Who are we<br />checking today?</h1>
            <p class="screen-subtitle">Select a pet to keep the scan results organized in their health record.</p>
        </div>

        <!-- ── Pet List ── -->
        <div class="pet-selection-list" id="pet-selection-list"
            style="flex:1; overflow-y:auto; padding-bottom:20px; display:flex; flex-direction:column; gap:12px;">
            <!-- Dynamically populated by JS -->
        </div>

        <!-- ── Action Buttons ── -->
        <div class="pet-selection-actions" style="margin-top:auto; padding-top:16px;">
            <button class="btn-primary" onclick="goToScreen('screen-scan')"
                style="width:100%; margin-bottom:12px; background:var(--slate-ghost); color:var(--slate); border:none; box-shadow:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                    <circle cx="12" cy="13" r="4" />
                </svg>
                Scan without selecting
            </button>
        </div>

    </div>
</div>
