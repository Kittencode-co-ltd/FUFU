<div id="screen-pet-selection" class="screen" style="overflow-y:auto; padding:0;">
    <style>
        /* ─── Pet Selection: App-theme overrides ─── */
        #screen-pet-selection {
            background: var(--off-white);
            font-family: var(--font);
        }

        /* Header */
        #screen-pet-selection .sel-header {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: var(--white);
            padding: 28px 20px 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 0;
            flex-shrink: 0;
        }

        #screen-pet-selection .sel-back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: var(--white);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #screen-pet-selection .sel-back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #screen-pet-selection .sel-header-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        #screen-pet-selection .sel-header h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
            font-family: var(--font);
            letter-spacing: -0.3px;
        }

        #screen-pet-selection .sel-header p {
            font-size: 13px;
            opacity: 0.85;
            font-family: var(--font);
        }

        /* Scrollable content */
        #screen-pet-selection .sel-content {
            padding: 20px 20px 110px;
            overflow-y: auto;
            flex: 1;
        }

        /* Search + Add row */
        #screen-pet-selection .sel-search-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #screen-pet-selection .sel-search-container {
            flex: 1;
            position: relative;
        }

        #screen-pet-selection .sel-search-box {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1.5px solid var(--slate-ghost);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            background: var(--white);
            color: var(--slate);
            transition: all 0.2s;
            box-shadow: var(--shadow-card);
        }

        #screen-pet-selection .sel-search-box::placeholder {
            color: var(--slate-lite);
        }

        #screen-pet-selection .sel-search-box:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
        }

        #screen-pet-selection .sel-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-lite);
            font-size: 16px;
        }

        #screen-pet-selection .sel-clear-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--slate-ghost);
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            color: var(--slate-lite);
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
        }

        #screen-pet-selection .sel-clear-search:hover {
            background: #b0bec5;
        }

        #screen-pet-selection .sel-clear-search.visible {
            display: flex;
        }

        #screen-pet-selection .sel-add-pet-btn-compact {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border: 1.5px dashed var(--teal);
            border-radius: var(--radius-sm);
            background: var(--teal-light);
            color: var(--teal-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.2s;
            box-shadow: var(--shadow-card);
        }

        #screen-pet-selection .sel-add-pet-btn-compact:hover {
            background: var(--teal);
            color: var(--white);
            border-style: solid;
            transform: scale(1.05);
        }

        /* Section titles */
        #screen-pet-selection .sel-section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--slate);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--font);
        }

        #screen-pet-selection .sel-section-title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #screen-pet-selection .sel-section-title i {
            color: var(--teal);
        }

        #screen-pet-selection .sel-pet-count-badge {
            background: var(--teal-light);
            color: var(--teal-dark);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font);
        }

        /* Pagination wrapper */
        #screen-pet-selection .sel-pagination-wrapper {
            position: relative;
            overflow: hidden;
            margin-bottom: 8px;
            touch-action: pan-y;
        }

        #screen-pet-selection .sel-pagination-container {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #screen-pet-selection .sel-pagination-page {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Pet Cards */
        #screen-pet-selection .sel-pet-card {
            background: var(--white);
            border: 1.5px solid var(--slate-ghost);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            font-family: var(--font);
        }

        #screen-pet-selection .sel-pet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--teal);
            transform: scaleY(0);
            transition: transform 0.25s;
            border-radius: 0 2px 2px 0;
        }

        #screen-pet-selection .sel-pet-card:hover {
            border-color: var(--teal);
            transform: translateX(4px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.15);
        }

        #screen-pet-selection .sel-pet-card:hover::before {
            transform: scaleY(1);
        }

        #screen-pet-selection .sel-pet-card.selected {
            border-color: var(--teal);
            background: var(--teal-light);
            box-shadow: 0 4px 16px rgba(13, 148, 136, 0.2);
        }

        #screen-pet-selection .sel-pet-card.selected::before {
            transform: scaleY(1);
        }

        #screen-pet-selection .sel-pet-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--teal-light) 0%, #a7f3d0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        #screen-pet-selection .sel-pet-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #screen-pet-selection .sel-pet-status {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid var(--white);
        }

        #screen-pet-selection .sel-pet-status.healthy {
            background: #22c55e;
        }

        #screen-pet-selection .sel-pet-status.warning {
            background: #f59e0b;
        }

        #screen-pet-selection .sel-pet-status.critical {
            background: #ef4444;
        }

        #screen-pet-selection .sel-pet-info {
            flex: 1;
            min-width: 0;
        }

        #screen-pet-selection .sel-pet-info h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--slate);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #screen-pet-selection .sel-pet-info p {
            font-size: 12px;
            color: var(--slate-lite);
            margin-bottom: 4px;
            margin-top: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #screen-pet-selection .sel-pet-health {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        #screen-pet-selection .sel-pet-health.healthy {
            background: #dcfce7;
            color: #16a34a;
        }

        #screen-pet-selection .sel-pet-health.warning {
            background: #fef3c7;
            color: #d97706;
        }

        #screen-pet-selection .sel-pet-health.critical {
            background: #fee2e2;
            color: #dc2626;
        }

        #screen-pet-selection .sel-pet-health i {
            font-size: 11px;
        }

        #screen-pet-selection .sel-select-indicator {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--slate-ghost);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        #screen-pet-selection .sel-pet-card.selected .sel-select-indicator,
        #screen-pet-selection .sel-guest-pet-card.selected .sel-select-indicator {
            background: var(--teal);
            border-color: var(--teal);
        }

        #screen-pet-selection .sel-select-indicator i {
            color: var(--white);
            font-size: 12px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.25s;
        }

        #screen-pet-selection .sel-pet-card.selected .sel-select-indicator i,
        #screen-pet-selection .sel-guest-pet-card.selected .sel-select-indicator i {
            opacity: 1;
            transform: scale(1);
        }

        /* Pagination controls */
        #screen-pet-selection .sel-pagination-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 6px;
            margin-top: 8px;
        }

        #screen-pet-selection .sel-pagination-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--white);
            border: 1.5px solid var(--slate-ghost);
            color: var(--slate-lite);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: var(--shadow-card);
        }

        #screen-pet-selection .sel-pagination-btn:hover:not(:disabled) {
            background: var(--teal-light);
            border-color: var(--teal);
            color: var(--teal-dark);
            transform: scale(1.05);
        }

        #screen-pet-selection .sel-pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #screen-pet-selection .sel-pagination-dots {
            display: flex;
            gap: 6px;
        }

        #screen-pet-selection .sel-pagination-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--slate-ghost);
            cursor: pointer;
            transition: all 0.3s;
        }

        #screen-pet-selection .sel-pagination-dot.active {
            background: var(--teal);
            width: 24px;
            border-radius: 4px;
        }

        #screen-pet-selection .sel-pagination-info {
            text-align: center;
            color: var(--slate-lite);
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        /* Swipe hint */
        #screen-pet-selection .sel-swipe-hint {
            text-align: center;
            color: var(--slate-lite);
            font-size: 11px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        #screen-pet-selection .sel-swipe-hint i {
            animation: selSwipeAnim 2s infinite;
        }

        @keyframes selSwipeAnim {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(4px);
            }
        }

        /* No results */
        #screen-pet-selection .sel-no-results {
            text-align: center;
            padding: 32px 20px;
            color: var(--slate-lite);
            display: none;
        }

        #screen-pet-selection .sel-no-results.visible {
            display: block;
        }

        #screen-pet-selection .sel-no-results i {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
            display: block;
        }

        #screen-pet-selection .sel-no-results p {
            font-size: 14px;
        }

        /* Guest pet */
        #screen-pet-selection .sel-guest-pet-section {
            margin-top: 8px;
        }

        #screen-pet-selection .sel-guest-pet-card {
            background: var(--white);
            border: 1.5px dashed #f59e0b;
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: var(--shadow-card);
            font-family: var(--font);
        }

        #screen-pet-selection .sel-guest-pet-card:hover {
            border-color: #d97706;
            background: #fef3c7;
            transform: translateX(4px);
        }

        #screen-pet-selection .sel-guest-pet-card.selected {
            border-color: #d97706;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.25);
        }

        #screen-pet-selection .sel-guest-pet-card.selected .sel-guest-pet-info h3,
        #screen-pet-selection .sel-guest-pet-card.selected .sel-guest-pet-info p,
        #screen-pet-selection .sel-guest-pet-card.selected .sel-no-save-notice {
            color: var(--white) !important;
        }

        #screen-pet-selection .sel-guest-pet-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #fef3c7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
        }

        #screen-pet-selection .sel-guest-pet-card.selected .sel-guest-pet-icon {
            background: rgba(255, 255, 255, 0.25);
        }

        #screen-pet-selection .sel-guest-pet-info {
            flex: 1;
        }

        #screen-pet-selection .sel-guest-pet-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--slate);
            margin-bottom: 3px;
        }

        #screen-pet-selection .sel-guest-pet-info p {
            font-size: 12px;
            color: var(--slate-lite);
            margin-bottom: 6px;
            margin-top: 0;
        }

        #screen-pet-selection .sel-no-save-notice {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fee2e2;
            color: #dc2626;
            padding: 3px 8px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 600;
        }

        #screen-pet-selection .sel-guest-pet-card.selected .sel-no-save-notice {
            background: rgba(255, 255, 255, 0.25);
            color: var(--white);
        }

        /* Start Scan fixed button */
        #screen-pet-selection .sel-start-scan-btn-wrap {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 320px;
            z-index: 10;
        }

        #screen-pet-selection .sel-start-scan-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            border: none;
            border-radius: var(--radius-sm);
            color: var(--white);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(13, 148, 136, 0.35);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }

        #screen-pet-selection .sel-start-scan-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(13, 148, 136, 0.45);
        }

        #screen-pet-selection .sel-start-scan-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        #screen-pet-selection .sel-start-scan-btn:disabled {
            background: var(--slate-ghost);
            color: var(--slate-lite);
            box-shadow: none;
            cursor: not-allowed;
        }

        #screen-pet-selection .sel-start-scan-btn.sel-guest-mode {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.35);
        }

        #screen-pet-selection .sel-start-scan-btn.sel-guest-mode:hover:not(:disabled) {
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.45);
        }
    </style>

    <div class="sel-header">
        <button class="sel-back-btn" onclick="goToScreen('screen-home')">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="sel-header-icon">🐾</div>
        <h1>Select Pet</h1>
        <p>Choose a pet to begin health scan · <span id="sel-header-pet-count"></span></p>
    </div>

    <div class="sel-content">

        <!-- Search + Add -->
        <div class="sel-search-add-row">
            <div class="sel-search-container">
                <i class="fas fa-search sel-search-icon"></i>
                <input type="text" class="sel-search-box" id="selSearchBox" placeholder="Search pet name..."
                    oninput="searchSelPets()">
                <button class="sel-clear-search" id="selClearSearch" onclick="clearSelSearch()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="sel-add-pet-btn-compact" onclick="checkAddPet()" title="Add new pet">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- My Pets -->
        <div class="sel-section-title">
            <div class="sel-section-title-left">
                <i class="fas fa-heart"></i> My Pets
            </div>
            <span class="sel-pet-count-badge" id="selVisibleCount">0 pets</span>
        </div>

        <div class="sel-pagination-wrapper" id="selPaginationWrapper">
            <div class="sel-pagination-container" id="selPaginationContainer"></div>
        </div>

        <div class="sel-swipe-hint" id="selSwipeHint" style="display:none;">
            <i class="fas fa-arrow-left"></i>
            <span>Swipe to browse</span>
            <i class="fas fa-arrow-right"></i>
        </div>

        <div class="sel-pagination-controls" id="selPaginationControls" style="display:none;">
            <button class="sel-pagination-btn" id="selPrevBtn" onclick="changeSelPage(-1)">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="sel-pagination-dots" id="selPaginationDots"></div>
            <button class="sel-pagination-btn" id="selNextBtn" onclick="changeSelPage(1)">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
        <div class="sel-pagination-info" id="selPaginationInfo" style="display:none;"></div>

        <div class="sel-no-results" id="selNoResults">
            <i class="fas fa-search"></i>
            <p>No pets found</p>
        </div>

        <!-- Other Options -->
        <div class="sel-guest-pet-section">
            <div class="sel-section-title">
                <div class="sel-section-title-left">
                    <i class="fas fa-user-friends"></i> Other Options
                </div>
            </div>
            <div class="sel-guest-pet-card" id="sel-card-guest" onclick="selectSelGuest()">
                <div class="sel-guest-pet-icon">
                    <i class="fas fa-dog" style="font-size:26px; color:#92400e;"></i>
                </div>
                <div class="sel-guest-pet-info">
                    <h3>Not My Pet</h3>
                    <p>Scan other people's pets or stray animals</p>
                    <div class="sel-no-save-notice">
                        <i class="fas fa-ban"></i>
                        Results will not be saved
                    </div>
                </div>
                <div class="sel-select-indicator"><i class="fas fa-check"></i></div>
            </div>
        </div>

    </div>

    <!-- Scan CTA -->
    <div class="sel-start-scan-btn-wrap">
        <button class="sel-start-scan-btn" id="selStartScanBtn" onclick="startSelectedScan()" disabled>
            <i class="fas fa-camera"></i>
            <span id="selScanBtnText">Select a pet to start scanning</span>
        </button>
    </div>

</div>
