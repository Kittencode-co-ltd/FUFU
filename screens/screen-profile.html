<div id="screen-profile" class="screen">
    <div class="screen-inner">
        <div class="screen-header">
            <div class="header-chip">New Patient</div>
            <h1 class="screen-title">Who are we caring<br />for today?</h1>
            <p class="screen-subtitle">Tell us about your furry friend</p>
        </div>

        <!-- Pet Photo Upload -->
        <div class="pet-photo-upload" onclick="document.getElementById('pet-photo-input').click()">
            <div class="pet-photo-preview" id="pet-photo-preview">
                <div class="pet-photo-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        class="photo-placeholder-icon">
                        <rect x="3" y="3" width="18" height="18" rx="4" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    <span>Add Pet Photo</span>
                </div>
                <img id="pet-photo-img" class="pet-photo-img" style="display:none" alt="Pet photo" />
            </div>
            <div class="pet-photo-edit-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="width:12px;height:12px">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </div>
            <input type="file" id="pet-photo-input" accept="image/*" style="display:none"
                onchange="previewPetPhoto(this)" />
        </div>

        <!-- Pet Type Toggle -->
        <div class="pet-toggle-wrap">
            <div class="pet-toggle" id="pet-toggle">
                <div class="toggle-slider" id="toggle-slider"></div>
                <button class="toggle-btn active" id="btn-dog" onclick="selectPet('dog')">
                    <span class="toggle-emoji">🐶</span> Dog
                </button>
                <button class="toggle-btn" id="btn-cat" onclick="selectPet('cat')">
                    <span class="toggle-emoji">🐱</span> Cat
                </button>
            </div>
        </div>

        <!-- Form Fields -->
        <div class="form-stack">
            <div class="form-row">
                <div class="input-group">
                    <label class="input-label">Pet's Name</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                        <input type="text" class="field-input" id="pet-name" placeholder="e.g. Mochi" />
                    </div>
                </div>
            </div>

            <div class="form-row two-col">
                <div class="input-group">
                    <label class="input-label">Age</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input type="number" class="field-input" id="pet-age" placeholder="Years" min="0" max="30" />
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Weight (kg)</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="5" r="3" />
                            <path d="M6.5 8a2 2 0 0 0-1.905 1.38L3 13h18l-1.595-3.62A2 2 0 0 0 17.5 8h-11z" />
                            <path d="M3 13v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        </svg>
                        <input type="number" class="field-input" id="pet-weight" placeholder="kg" step="0.1" />
                    </div>
                </div>
            </div>

            <!-- Gender & Microchip -->
            <div class="form-row two-col">
                <div class="input-group">
                    <label class="input-label">Gender</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="10" r="4" />
                            <path d="M12 14v7M9 18h6" />
                        </svg>
                        <select class="field-input" id="pet-gender"
                            style="background:transparent; padding-left:44px; appearance:none; -webkit-appearance:none;">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Neutered Male">Neutered Male</option>
                            <option value="Spayed Female">Spayed Female</option>
                        </select>
                        <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2"
                            style="position:absolute; right:12px; top:12px; width:20px; height:20px; color:var(--slate-lite); pointer-events:none;">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Microchip ID <span
                            style="font-weight:400; font-size:12px; color:var(--slate-lite)">(Optional)</span></label>
                    <div class="input-wrap">
                        <!-- QR Scanner Icon -->
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            style="cursor:pointer;" onclick="alert('Scanning QR...')">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <path d="M9 22H5a2 2 0 0 1-2-2v-4" />
                            <path d="M9 2V21" stroke-dasharray="2 4" />
                        </svg>
                        <input type="text" class="field-input" id="pet-microchip" placeholder="e.g. 933..." />
                    </div>
                </div>
            </div>

            <!-- ① DNA icon for breed -->
            <div class="input-group">
                <label class="input-label">Breed</label>
                <div class="input-wrap select-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 2c2.5 2.5 5 5 5 9s-2.5 6.5-5 9" />
                        <path d="M22 2c-2.5 2.5-5 5-5 9s2.5 6.5 5 9" />
                        <path d="M3.5 8h17" />
                        <path d="M3.5 16h17" />
                    </svg>
                    <input type="text" class="field-input" id="breed-search" placeholder="Search breed..."
                        oninput="filterBreeds(this.value)" onfocus="openBreedDropdown()" autocomplete="off" />
                    <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9" />
                    </svg>
                </div>
                <div class="breed-dropdown" id="breed-dropdown"></div>
            </div>
        </div>

        <button class="btn-primary" onclick="syncPetInfoDisplays(); goToScreen('screen-home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon">
                <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
            Continue
        </button>
    </div>
</div>
