<div id="screen-chat" class="screen">
    <div class="chat-fullscreen">
        <div class="chat-header">
            <div class="chat-header-info">
                <div class="chat-avatar">🤖</div>
                <div>
                    <div class="chat-name">PetCare AI</div>
                    <div class="chat-status"><span class="chat-online-dot"></span>Online</div>
                </div>
            </div>
            <button class="chat-clear-btn" onclick="clearChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="width:18px;height:18px">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6M14 11v6" />
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
            </button>
        </div>

        <!-- VIP Plan: Call Vet banner -->
        <div class="vip-call-banner" id="vip-call-banner" style="display:none">
            <div class="vcb-text">
                <span class="vcb-badge">👑 VET VIP</span>
                <span>Speak directly with a licensed vet</span>
            </div>
            <div class="vcb-btns">
                <button class="vcb-btn voice" onclick="alert('Connecting to vet... (demo)')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:16px;height:16px">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.5a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                    </svg>
                    Call
                </button>
                <button class="vcb-btn video" onclick="alert('Starting video call... (demo)')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" style="width:16px;height:16px">
                        <polygon points="23 7 16 12 23 17 23 7" />
                        <rect x="1" y="5" width="15" height="14" rx="2" />
                    </svg>
                    Video
                </button>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="chat-bubble bot">
                <div class="bubble-text">👋 สวัสดีครับ! ผม PetCare AI ผู้ช่วยดูแลสุขภาพสัตว์เลี้ยงแสนรู้ของคุณ
                    🐶🐱<br /><br />วันนี้มีอะไรให้ผมช่วยดูแลน้องๆ บ้างไหมครับ? พิมพ์ถามอาการเบื้องต้น
                    หรือส่งรูปภาพมาให้ผมวิเคราะห์ได้เลยนะครับ 😊</div>
                <div class="bubble-time">Now</div>
            </div>

            <div class="chat-quick-replies" id="quick-replies">
                <button class="quick-reply-btn" onclick="sendQuickReply('✨ ทดลองระบบ (Demo)')"
                    style="border-color:#8B5CF6; color:#8B5CF6;">✨ ทดลองระบบ</button>
                <button class="quick-reply-btn" onclick="sendQuickReply('น้องหมาของฉันเกาตัวตลอดเวลา')">🐶
                    น้องเกาตัวตลอด</button>
                <button class="quick-reply-btn" onclick="sendQuickReply('สัตว์เลี้ยงไม่ยอมกินข้าว')">🍽️
                    ไม่ยอมกินข้าว</button>
                <button class="quick-reply-btn" onclick="sendQuickReply('วัคซีนควรฉีดตอนไหน')">💉 ตารางวัคซีน</button>
            </div>
        </div>

        <div class="chat-input-bar">
            <button class="chat-upload-btn" onclick="document.getElementById('chat-photo-input').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    style="width:20px;height:20px">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
            <input type="file" id="chat-photo-input" accept="image/*" style="display:none"
                onchange="sendChatImage(this)">
            <input type="text" class="chat-input" id="chat-input" placeholder="พิมพ์ข้อความหรือส่งรูปภาพ..."
                onkeydown="if(event.key==='Enter')sendChat()" />
            <button class="chat-send-btn" onclick="sendChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="width:20px;height:20px">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
            </button>
        </div>
    </div>
</div>
