<div id="login-modal-overlay" class="login-modal-overlay" onclick="if(event.target===this)closeLoginModal()">
    <div class="login-modal">
        <div class="login-modal-handle"></div>
        <div class="login-modal-header">
            <img src="pcare_logo.png" alt="FUFU Pet Care" class="login-modal-logo" />
            <h3 class="login-modal-title">เข้าสู่ระบบ</h3>
            <p class="login-modal-sub">เพื่อใช้งานฟีเจอร์นี้</p>
        </div>
        <!-- Social Login -->
        <div class="social-btns">
            <button class="social-btn google" onclick="socialLogin('google')">
                <svg viewBox="0 0 24 24" class="social-icon">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Continue with Google
            </button>
            <button class="social-btn facebook" onclick="socialLogin('facebook')">
                <svg viewBox="0 0 24 24" class="social-icon" fill="#1877F2">
                    <path
                        d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                </svg>
                Continue with Facebook
            </button>
        </div>
        <div class="auth-divider"><span>or</span></div>
        <!-- Quick Login Form -->
        <div class="input-group">
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
                <input type="email" class="field-input" id="modal-login-email" placeholder="อีเมลของคุณ" />
            </div>
        </div>
        <div class="input-group" style="margin-bottom:16px">
            <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input type="password" class="field-input" id="modal-login-pass" placeholder="รหัสผ่าน" />
            </div>
        </div>
        <button class="btn-primary" onclick="doModalLogin()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="btn-icon">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                <polyline points="10 17 15 12 10 7" />
                <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Sign In
        </button>
        <p class="login-modal-register-link">ยังไม่มีบัญชี? <span
                onclick="closeLoginModal(); goToScreen('screen-auth'); switchAuthTab('register');">สมัครสมาชิก</span>
        </p>
    </div>
</div>
